<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/user_form.css' %}">
    <title>Person Form</title>
</head>
<body>
    <div class="cover">
        <form action="" method="post">
            {% csrf_token %}
            <h1>Person Form</h1>
            <div class="full-name">
                <input type="text" id="name" placeholder="name" name="name" required>
                <input type="text" id="surname" placeholder="Surname" name="surname" required>
            </div>
            <input type="number" id="age" placeholder="Age" name="age" required>
            <input type="email" id="email" placeholder="Email" name="email" required>
            <div class="phone">
                <input type="tel" id="code" placeholder="+998" name="code" required>
                <input type="tel" id="phone" placeholder="1234567" name="phone" required>
            </div>
            <select name="gender" id="" required> 
                <option id="gender" value="" disabled selected hidden>Select Gender</option>
                <option placeholder="sex" value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">yebane</option>
                <option value="trans">Transgender</option>
            </select>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
